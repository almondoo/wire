version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
    ignore:
      # golang.org/x/tools は v0.25.0 以降 Go 1.22+ を要求し、Go 1.19 サポートと非互換(#21/#28/#32/#35)
      - dependency-name: "golang.org/x/tools"
        versions: [">= 0.25.0"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    labels:
      - "ci"
